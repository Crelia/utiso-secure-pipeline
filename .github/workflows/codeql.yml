name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly (Mon 03:27 UTC). Re-scans existing code against newly published
    # queries even when nothing changed — yesterday's clean code can be today's
    # finding when a new rule ships.
    - cron: "27 3 * * 1"

# Least privilege at the top; the one job widens only what it needs.
permissions:
  contents: read

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (python)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required so CodeQL can upload its findings to the repo's Security tab.
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Initialize CodeQL
        uses: github/codeql-action/init@c35d1b164463ee62a100735382aaaa525c5d3496 # v2.25.6
        with:
          languages: python
          # Broader query pack than the default: more security coverage at the
          # cost of some extra runtime / potential lower-severity noise.
          queries: security-extended

      # No build step: Python is interpreted, so CodeQL analyzes the source
      # directly (no autobuild needed).
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@c35d1b164463ee62a100735382aaaa525c5d3496 # v2.25.6
        with:
          category: "/language:python"
