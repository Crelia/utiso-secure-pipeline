name: Release

on:
  # Only (re)publish when something that actually changes the image changes.
  # A docs-only or test-only commit shouldn't rebuild and re-sign the container.
  push:
    branches: [main]
    paths:
      - "app/**"
      - "Dockerfile"
      - "requirements.txt"
      - ".github/workflows/release.yml"
  # Manual trigger is always available for an on-demand publish.
  workflow_dispatch: {}

# Read-only by default; the single job widens exactly what the publish needs.
permissions:
  contents: read

# Never cancel a publish mid-flight (unlike CI, where cancelling is fine).
concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  build-scan-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout
      packages: write # push the image (and signatures/attestations) to GHCR
      id-token: write # OIDC: keyless cosign signing + attestations
      attestations: write # write SLSA provenance + SBOM attestations
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Compute lowercase image name
        # GHCR requires a lowercase path; github.repository contains "Crelia".
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      # 1) Build and LOAD locally (do NOT push). We scan before anything ships.
      - name: Build image (load for scanning)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          load: true
          tags: localbuild:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 2) FAIL-CLOSED gate: a fixable HIGH/CRITICAL in the image stops the
      #    publish entirely. This is the whole point of scanning before push.
      - name: Scan image (fail-closed)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: localbuild:scan
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: table

      # 3) Only now do we push. buildx cache makes this near-instant (same build
      #    as step 1). provenance:false keeps a clean single-arch digest so the
      #    attestations below attach to a predictable subject.
      - name: Push image to GHCR
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 4) Sign the image KEYLESSLY by digest. Identity comes from the workflow's
      #    OIDC token (no stored key); the signature is logged to Rekor.
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image (keyless, by digest)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${REGISTRY}/${IMAGE_NAME}@${DIGEST}"

      # 5) SLSA build provenance attestation, pushed to the registry next to the
      #    image: verifiable record of how/where it was built.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      # 6) CycloneDX SBOM (generated by Trivy), then attested + pushed to the
      #    registry: a verifiable inventory of everything in the image.
      - name: Generate CycloneDX SBOM
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: localbuild:scan
          format: cyclonedx
          output: sbom.cdx.json

      - name: Attest SBOM
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          sbom-path: sbom.cdx.json
          push-to-registry: true
